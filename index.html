function setSaveStatus(cls, text) {
  const el = document.getElementById('save-status');
  el.className = 'save-status' + (cls ? ' ' + cls : '');
  el.textContent = text;
}

function buildWysiwygToolbar(wysiwyg, catSlug) {
  const bar = document.createElement('div');
  bar.className = 'wysiwyg-toolbar';

  const btn = (html, cmd, val) => {
    const b = document.createElement('button');
    b.className = 'wysiwyg-btn';
    b.innerHTML = html;
    b.addEventListener('mousedown', e => {
      e.preventDefault();
      wysiwyg.focus();
      document.execCommand(cmd, false, val || null);
    });
    return b;
  };

  const sep = () => { const s = document.createElement('div'); s.className = 'wysiwyg-sep'; return s; };

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.style.display = 'none';
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    fileInput.value = '';
    try {
      const url = await uploadImage(file, catSlug);
      wysiwyg.focus();
      document.execCommand('insertImage', false, url);
    } catch (e) { alert('Erro ao carregar imagem: ' + e.message); }
  });
  bar.appendChild(fileInput);

  const imgBtn = document.createElement('button');
  imgBtn.className = 'wysiwyg-btn';
  imgBtn.textContent = 'IMG';
  imgBtn.addEventListener('mousedown', e => { e.preventDefault(); fileInput.click(); });

  const linkBtn = document.createElement('button');
  linkBtn.className = 'wysiwyg-btn';
  linkBtn.textContent = 'Link';
  linkBtn.addEventListener('mousedown', async e => {
    e.preventDefault();
    const sel = window.getSelection();
    const range = sel && sel.rangeCount ? sel.getRangeAt(0).cloneRange() : null;
    const url = await showPrompt('URL:', 'https://');
    if (!url) return;
    wysiwyg.focus();
    if (range) { sel.removeAllRanges(); sel.addRange(range); }
    document.execCommand('createLink', false, url);
  });

  bar.append(
    btn('<b>B</b>', 'bold'), btn('<i>I</i>', 'italic'), btn('<u>U</u>', 'underline'),
    sep(),
    btn('H1', 'formatBlock', 'h1'), btn('H2', 'formatBlock', 'h2'), btn('H3', 'formatBlock', 'h3'), btn('P', 'formatBlock', 'p'),
    sep(),
    btn('UL', 'insertUnorderedList'), btn('OL', 'insertOrderedList'),
    sep(),
    imgBtn, linkBtn,
    sep(),
    btn('✕', 'removeFormat')
  );
  return bar;
}

function openEditor(rawContent, type) {
  if (locked) return;
  const area = document.getElementById('content-area');
  const editorBasePath = activeWiki
    ? `/${activeWiki}/topics/${currentTopic.catSlug}/`
    : `/topics/${currentTopic.catSlug}/`;

  const wrap = document.createElement('div');
  wrap.className = 'editor-wrap';

  const actions = document.createElement('div');
  actions.className = 'editor-actions';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-save-topic';
  saveBtn.textContent = '✓ Guardar';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-cancel-edit';
  cancelBtn.textContent = 'Cancelar';
  cancelBtn.addEventListener('click', () => loadTopic(currentTopic));

  actions.appendChild(saveBtn);
  actions.appendChild(cancelBtn);
  wrap.appendChild(actions);

  let focusTarget;

  if (type === 'html') {
    const wysiwyg = document.createElement('div');
    wysiwyg.className = 'editor-preview';
    wysiwyg.contentEditable = 'true';
    wysiwyg.spellcheck = false;
    wysiwyg.innerHTML = sanitizeHtml(rawContent, editorBasePath);
    focusTarget = wysiwyg;
    wrap.appendChild(buildWysiwygToolbar(wysiwyg, currentTopic.catSlug));
    wrap.appendChild(wysiwyg);

    // ── image resize overlay ──────────────────────────────
    const overlay = document.createElement('div');
    overlay.className = 'img-select-overlay';
    for (const pos of ['nw', 'ne', 'sw', 'se']) {
      const h = document.createElement('div');
      h.className = `img-resize-handle ${pos}`;
      overlay.appendChild(h);
    }
    wrap.appendChild(overlay);

    let selectedImg = null;

    const positionOverlay = () => {
      if (!selectedImg) return;
      const wRect = wrap.getBoundingClientRect();
      const iRect = selectedImg.getBoundingClientRect();
      overlay.style.left   = (iRect.left   - wRect.left) + 'px';
      overlay.style.top    = (iRect.top    - wRect.top)  + 'px';
      overlay.style.width  = iRect.width  + 'px';
      overlay.style.height = iRect.height + 'px';
    };

    wysiwyg.addEventListener('click', e => {
      if (e.target.tagName === 'IMG') {
        selectedImg = e.target;
        overlay.classList.add('active');
        positionOverlay();
      } else {
        selectedImg = null;
        overlay.classList.remove('active');
      }
    });

    wysiwyg.addEventListener('scroll', positionOverlay);

    overlay.querySelectorAll('.img-resize-handle').forEach(handle => {
      handle.addEventListener('mousedown', e => {
        e.preventDefault();
        e.stopPropagation();
        const startX    = e.clientX;
        const startW    = selectedImg.getBoundingClientRect().width;
        const isLeft    = handle.classList.contains('nw') || handle.classList.contains('sw');

        const onMove = e => {
          const dx = e.clientX - startX;
          const newW = Math.max(40, isLeft ? startW - dx : startW + dx);
          selectedImg.style.width  = newW + 'px';
          selectedImg.style.height = 'auto';
          positionOverlay();
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });

    focusTarget = wysiwyg;

    wysiwyg.addEventListener('paste', async e => {
      const items = [...(e.clipboardData?.items || [])];
      const imgItem = items.find(i => i.type.startsWith('image/'));
      if (imgItem) {
        e.preventDefault();
        const file = new File([imgItem.getAsFile()], `paste-${Date.now()}.png`, { type: imgItem.type });
        try {
          const url = await uploadImage(file, currentTopic.catSlug);
          document.execCommand('insertImage', false, url);
        } catch (err) { alert('Erro ao colar imagem: ' + err.message); }
        return;
      }
      const html = e.clipboardData?.getData('text/html');
      if (html) {
        e.preventDefault();
        document.execCommand('insertHTML', false, sanitizeHtml(html));
      }
    });

    saveBtn.addEventListener('click', () => {
      const clone = wysiwyg.cloneNode(true);
      clone.querySelectorAll('img[src]').forEach(img => {
        const src = img.getAttribute('src');
        if (src.startsWith(editorBasePath)) img.setAttribute('src', src.slice(editorBasePath.length));
      });
      saveTopic(clone.innerHTML, type);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.className = 'editor-textarea';
    ta.spellcheck = false;
    ta.autocomplete = 'off';
    ta.setAttribute('autocorrect', 'off');
    ta.setAttribute('autocapitalize', 'off');
    ta.value = rawContent;
    requestAnimationFrame(() => { ta.scrollTop = 0; ta.setSelectionRange(0, 0); });
    focusTarget = ta;

    const preview = document.createElement('div');
    preview.className = 'editor-preview content';
    preview.innerHTML = parseMarkdown(rawContent);
    ta.addEventListener('input', () => { preview.innerHTML = parseMarkdown(ta.value); });

    const panes = document.createElement('div');
    panes.className = 'editor-panes';
    panes.appendChild(ta);
    panes.appendChild(preview);
    wrap.appendChild(panes);

    saveBtn.addEventListener('click', () => saveTopic(ta.value, type));
  }

  document.body.classList.add('editing');
  area.innerHTML = '';
  area.appendChild(wrap);
  focusTarget.focus();
}

async function saveTopic(rawMd, type) {
  if (!currentTopic) return;
  setSaveStatus('saving', 'a guardar…');
  try {
    await apiFetch(
      `/api/topic?cat=${encodeURIComponent(currentTopic.catSlug)}&slug=${encodeURIComponent(currentTopic.slug)}${wikiParam()}`,
      { method: 'PUT', headers: { 'Content-Type': 'text/plain; charset=utf-8' }, body: rawMd }
    );
    const cat = categories.find(c => c.slug === currentTopic.catSlug);
    if (cat) {
      const t = cat.topics.find(t => t.slug === currentTopic.slug);
      if (t) { t.title = extractTitle(rawMd, currentTopic.slug, type); currentTopic.title = t.title; }
    }
    currentTopic.type = type || currentTopic.type || 'md';
    buildSidebar();
    setSaveStatus('saved', '✓ guardado');
    setTimeout(() => setSaveStatus('', ''), 2500);
    await loadTopic(currentTopic);
  } catch (e) {
    setSaveStatus('error', '✕ erro');
  }
}

async function addTopic(catIdx) {
  const cat = categories[catIdx];
  if (!cat) return;
  const name = await showPrompt(`Novo tópico em "${cat.display}":`, 'ex: meu topico');
  if (!name) return;
  const type = await showTypePicker();

  try {
    const data = await apiFetch('/api/topic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wiki: activeWiki, cat: cat.slug, name: name.trim(), type })
    });
    const newTopic = { slug: data.slug, title: data.title, type: data.type };
    cat.topics.push(newTopic);
    buildSidebar();
    buildWelcome();
    await loadTopic({ catSlug: cat.slug, slug: data.slug, title: data.title, type });
    openEditor(data.content, type);
  } catch (e) {
    alert('Erro ao criar tópico: ' + e.message);
  }
}

async function addCategory() {
  const name = await showPrompt('Nome da nova categoria:', 'ex: minha-categoria');
  if (!name) return;

  try {
    const data = await apiFetch('/api/category', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wiki: activeWiki, name: name.trim() })
    });
    categories.push({ slug: data.slug, display: data.display, topics: [] });
    buildSidebar();
    buildWelcome();
  } catch (e) {
    alert('Erro ao criar categoria: ' + e.message);
  }
}

async function deleteCurrentTopic() {
  if (!currentTopic) return;
  const confirmed = await showConfirm(`Apagar "${currentTopic.title}"? Esta acção é irreversível.`);
  if (!confirmed) return;

  try {
    await apiFetch(
      `/api/topic?cat=${encodeURIComponent(currentTopic.catSlug)}&slug=${encodeURIComponent(currentTopic.slug)}${wikiParam()}`,
      { method: 'DELETE' }
    );
    const cat = categories.find(c => c.slug === currentTopic.catSlug);
    if (cat) cat.topics = cat.topics.filter(t => t.slug !== currentTopic.slug);
    currentTopic = null;
    buildSidebar();
    buildWelcome();
  } catch (e) {
    alert('Erro ao apagar: ' + e.message);
  }
}
