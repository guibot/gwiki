<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --bg: #0d0e10; --surface: #13151a; --surface2: #1a1d24;
      --border: #252830; --border2: #2e3240;
      --accent: #4ade80; --accent-dim: rgba(74,222,128,0.12);
      --accent-mid: #22c55e;
      --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.1);
      --text: #e2e4ea; --text2: #9ca3af; --text3: #6b7280;
      --code-bg: #111318; --danger: #f87171;
      --code-size: 14px;
      --sidebar-w: 268px; --header-h: 52px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Geist', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased; }

    /* ── LAYOUT ── */
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* ── FIRST RUN ── */
    #first-run {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #first-run .logo-icon {
      width: 48px; height: 48px; background: var(--accent); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #000; font-weight: 800;
    }
    #first-run h1 { font-size: 28px; font-weight: 700; color: #fff; }
    #first-run p { font-size: 14px; color: var(--text2); text-align: center; max-width: 380px; line-height: 1.7; }
    #first-run .btn-open {
      background: var(--accent); color: #000; border: none; border-radius: 9px;
      padding: 11px 24px; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Geist', sans-serif; transition: background 0.15s;
    }
    #first-run .btn-open:hover { background: var(--accent-mid); }
    #first-run .warn {
      font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--surface); border-right: 1px solid var(--border);
      display: none; flex-direction: column; overflow: hidden;
    }
    #sidebar.visible { display: flex; }

    #sidebar-top { padding: 18px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer; }
    .logo .logo-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #000; font-weight: 800; flex-shrink: 0; transition: background 0.15s; }
    .logo:hover .logo-icon { background: var(--accent-mid); }
    .logo-text { font-size: 13px; font-weight: 700; color: var(--text); }
    .logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }

    #search-wrap { position: relative; }
    #search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
    #search { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px 7px 30px; font-size: 12px; color: var(--text); font-family: 'JetBrains Mono', monospace; outline: none; transition: border-color 0.2s; }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text3); }

    #nav { overflow-y: auto; flex: 1; padding: 8px 0 16px; }
    #nav::-webkit-scrollbar { width: 3px; }
    #nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .nav-category { margin-top: 4px; }
    .nav-category-header { display: flex; align-items: center; gap: 6px; padding: 8px 18px 5px; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); font-family: 'JetBrains Mono', monospace; cursor: pointer; user-select: none; }
    .nav-category-header .cat-icon { font-size: 9px; color: var(--accent); }
    .nav-category-header .chevron { margin-left: auto; transition: transform 0.2s; font-size: 9px; color: var(--text3); }
    .nav-category.collapsed .chevron { transform: rotate(-90deg); }
    .nav-category.collapsed .nav-items { display: none; }

    .nav-item { display: flex; align-items: center; padding: 6px 18px 6px 28px; font-size: 13px; color: var(--text2); cursor: pointer; border-left: 2px solid transparent; transition: all 0.12s; gap: 7px; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.025); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-dim); font-weight: 600; }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
    .nav-item.active .nav-dot { background: var(--accent); }

    .nav-add-topic {
      display: none; margin: 3px 12px 6px; padding: 4px 8px;
      border: 1px dashed var(--border2); border-radius: 5px;
      font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .nav-add-topic:hover { border-color: var(--accent); color: var(--accent); }
    .nav-add-category {
      display: none; margin: 8px 12px 4px; padding: 6px 8px;
      border: 1px dashed var(--border2); border-radius: 5px;
      font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace;
      cursor: pointer; text-align: center; transition: border-color 0.15s, color 0.15s;
    }
    .nav-add-category:hover { border-color: var(--accent); color: var(--accent); }

    body.unlocked .nav-item[draggable],
    body.unlocked .nav-category[draggable] { cursor: grab; }
    body.unlocked .nav-item[draggable]:active,
    body.unlocked .nav-category[draggable]:active { cursor: grabbing; }
    .nav-item.dragging, .nav-category.dragging { opacity: 0.4; }
    .drag-indicator {
      height: 2px; background: var(--accent); border-radius: 1px;
      margin: 0 18px; pointer-events: none;
    }

    body.unlocked .nav-add-topic,
    body.unlocked .nav-add-category { display: block; }

    #no-results { display: none; padding: 40px 0; text-align: center; color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

    /* ── MAIN ── */
    #main { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    #main.visible { display: flex; }

    #topbar { height: var(--header-h); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 36px; gap: 10px; flex-shrink: 0; background: var(--surface); }
    .breadcrumb { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
    .breadcrumb .sep { color: var(--border2); }
    .breadcrumb .current { color: var(--text2); }
    .breadcrumb .bc-link { cursor: pointer; }
    .breadcrumb .bc-link:hover { color: var(--accent); text-decoration: underline; }

    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .btn-sidebar-toggle { background: transparent; border: none; color: var(--text3); cursor: pointer; padding: 4px 6px; font-size: 16px; line-height: 1; transition: color 0.15s; }
    .btn-sidebar-toggle:hover { color: var(--text); }
    .save-status { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); transition: color 0.3s; white-space: nowrap; display: none; }
    body.unlocked .save-status { display: block; }
    .save-status.saving { color: var(--text2); }
    .save-status.saved  { color: var(--accent); }
    .save-status.error  { color: var(--danger); }

    .btn-delete {
      display: none; background: transparent; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px; font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--text3); cursor: pointer; transition: all 0.15s;
    }
    .btn-delete:hover { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.07); }
    body.unlocked .btn-delete.visible { display: block; }

    .btn-lock { display: flex; align-items: center; gap: 6px; background: transparent; color: var(--text2); border: 1.5px solid var(--border2); border-radius: 7px; padding: 7px 13px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.05em; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-lock:hover { background: var(--border); color: var(--text); }
    .btn-lock.locked { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-lock.locked:hover { background: #ccc; }
    body.viewer .btn-lock { display: none; }

    #content-area { flex: 1; overflow-y: auto; padding: 44px 60px 80px; max-width: 860px; }
    body.editing #content-area { max-width: unset; padding: 12px 16px; overflow: hidden; display: flex; flex-direction: column; }
    #content-area::-webkit-scrollbar { width: 5px; }
    #content-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── WELCOME ── */
    #welcome { padding: 60px 0 0; }
    .wiki-hero { display: flex; align-items: flex-end; gap: 20px; margin-bottom: 36px; }
    .wiki-hero h1 { font-size: 32px; font-weight: 800; color: #fff; line-height: 1.05; margin: 0; }
    .hero-text { display: flex; flex-direction: column; gap: 6px; }
    .hero-desc { font-size: 14px; color: var(--text2); margin: 0; }
    .hero-desc.empty { display: none; color: var(--text3); font-style: italic; }
    body.unlocked .hero-desc { cursor: pointer; }
    body.unlocked .hero-desc:hover { color: var(--text); }
    body.unlocked .hero-desc.empty { display: block; }
    .hero-cover { position: relative; width: 76px; height: 76px; border-radius: 16px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); flex-shrink: 0; }
    .hero-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-cover.empty img { display: none; }
    .hero-cover.empty { display: none; }
    .hero-cover-plus { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; font-size: 26px; color: var(--text3); }
    body.unlocked .hero-cover { cursor: pointer; }
    body.unlocked .hero-cover:hover { border-color: var(--border2); background: var(--surface2); }
    body.unlocked .hero-cover.empty { display: block; }
    body.unlocked .hero-cover.empty .hero-cover-plus { display: flex; }
    .hero-cover-handle { position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; background: var(--accent); border-radius: 2px; cursor: se-resize; display: none; z-index: 2; }
    body.unlocked .hero-cover:hover .hero-cover-handle,
    body.unlocked .hero-cover-handle.dragging { display: block; }
    .welcome-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
    .welcome-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: all 0.15s; }
    .welcome-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
    .welcome-card .wc-icon { font-size: 18px; margin-bottom: 8px; }
    .welcome-card .wc-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .welcome-card .wc-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }

    /* ── TOPIC ── */
    .topic-page { animation: fadeUp 0.18s ease; cursor: default; color: var(--text); }
    body.unlocked .topic-page { cursor: pointer; }
    body.unlocked .topic-page:hover { background: rgba(74,222,128,0.03); border-radius: 8px; outline: 1px dashed var(--border2); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .topic-page h1, .editor-preview h1 { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 18px; line-height: 1.1; }
    .topic-page h2, .editor-preview h2 { font-size: 15px; font-weight: 700; color: var(--blue); margin: 30px 0 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }
    .topic-page h3, .editor-preview h3 { font-size: 12px; font-weight: 600; color: var(--text2); margin: 18px 0 7px; text-transform: uppercase; letter-spacing: 0.08em; font-family: 'JetBrains Mono', monospace; }
    .topic-page p, .editor-preview p { font-size: 15px; line-height: 1.8; color: #c8cdd8; margin-bottom: 12px; }
    .topic-page ul, .topic-page ol, .editor-preview ul, .editor-preview ol { padding-left: 0; list-style: none; margin-bottom: 12px; }
    .topic-page ul li, .topic-page ol li, .editor-preview ul li, .editor-preview ol li { font-size: 15px; line-height: 1.75; color: #c8cdd8; padding: 3px 0 3px 18px; position: relative; }
    .topic-page ul li::before, .editor-preview ul li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 11px; top: 6px; }
    .topic-page ol, .editor-preview ol { counter-reset: item; }
    .topic-page ol li, .editor-preview ol li { counter-increment: item; }
    .topic-page ol li::before, .editor-preview ol li::before { content: counter(item) '.'; position: absolute; left: 0; color: var(--accent); font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 600; top: 4px; }
    .topic-page a, .editor-preview a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(74,222,128,0.3); transition: border-color 0.15s; }
    .topic-page a:hover, .editor-preview a:hover { border-bottom-color: var(--accent); }
    .md-img { max-width: 100%; border-radius: 8px; margin: 12px 0; display: block; border: 1px solid var(--border); }
    .topic-page p code, .topic-page li code, .editor-preview p code, .editor-preview li code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; color: var(--blue); }
    .topic-page pre, .editor-preview pre { position: relative; background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; overflow-x: auto; margin: 12px 0 18px; }
    .topic-page pre code, .editor-preview pre code { font-family: 'JetBrains Mono', monospace; font-size: var(--code-size); line-height: 1.7; color: #e2e8f0; background: none; border: none; padding: 0; }
    .copy-btn {
      position: absolute; top: 10px; right: 10px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 5px; padding: 3px 8px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3);
      cursor: pointer; opacity: 0; transition: opacity 0.15s, color 0.15s;
    }
    .topic-page pre:hover .copy-btn, .editor-preview pre:hover .copy-btn { opacity: 1; }
    .copy-btn.copied { color: var(--accent); border-color: var(--accent); }
    .callout { background: var(--blue-dim); border: 1px solid rgba(96,165,250,0.2); border-left: 3px solid var(--blue); border-radius: 8px; padding: 12px 16px; margin: 14px 0; font-size: 13px; color: #93c5fd; line-height: 1.65; }
    .callout.warn { background: rgba(251,191,36,0.07); border-color: rgba(251,191,36,0.2); border-left-color: #fbbf24; color: #fcd34d; }

    /* ── EDITOR ── */
    .editor-wrap { animation: fadeUp 0.15s ease; display: flex; flex-direction: column; flex: 1; min-height: 0; position: relative; }
    .img-select-overlay { position: absolute; pointer-events: none; z-index: 10; border: 2px solid var(--accent); box-sizing: border-box; display: none; }
    .img-select-overlay.active { display: block; }
    .img-resize-handle { position: absolute; width: 10px; height: 10px; background: var(--accent); border-radius: 2px; pointer-events: all; }
    .img-resize-handle.nw { top: -5px; left: -5px; cursor: nw-resize; }
    .img-resize-handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
    .img-resize-handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }
    .img-resize-handle.se { bottom: -5px; right: -5px; cursor: se-resize; }
    .editor-panes { display: flex; gap: 12px; flex: 1; min-height: 0; }
    .editor-textarea {
      flex: 1; min-height: 0; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: 10px;
      padding: 16px 18px; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.75; color: var(--text);
      resize: none; outline: none; transition: border-color 0.2s; overflow-y: auto;
    }
    .editor-textarea:focus { border-color: var(--accent); }
    .editor-preview[contenteditable] { outline: none; cursor: text; }
    .editor-preview[contenteditable]:focus { border-color: var(--accent); }
    .wysiwyg-toolbar {
      display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; padding: 5px 8px; flex-shrink: 0;
    }
    .wysiwyg-btn {
      background: transparent; border: 1px solid transparent; border-radius: 5px;
      padding: 3px 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text2); cursor: pointer; transition: all 0.12s; min-width: 28px; text-align: center;
    }
    .wysiwyg-btn:hover { background: var(--border); color: var(--text); }
    .wysiwyg-sep { width: 1px; background: var(--border2); margin: 3px 4px; }
    .editor-preview {
      flex: 1; min-height: 0; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: 10px;
      padding: 16px 18px; overflow-y: auto; font-size: 14px; line-height: 1.75; color: var(--text);
    }
    .editor-actions { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 8px; position: sticky; top: 16px; z-index: 10; }
    .btn-save-topic { background: var(--accent); color: #000; border: none; border-radius: 7px; padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Geist', sans-serif; transition: background 0.15s; }
    .btn-save-topic:hover { background: var(--accent-mid); }
    .btn-cancel-edit { background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: 7px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: 'Geist', sans-serif; transition: all 0.15s; }
    .btn-cancel-edit:hover { background: var(--border); color: var(--text); }

    /* ── HUB ── */
    #hub { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding: 60px 64px 80px; }
    #hub.visible { display: flex; }
    #hub h1 { font-size: 36px; font-weight: 800; color: #fff; margin-bottom: 10px; line-height: 1.1; }
    #hub h1 span { color: var(--accent); }
    body.hub-unlocked #hub-name-text { cursor: pointer; }
    body.hub-unlocked #hub-name-text:hover { border-bottom: 1px dashed var(--border2); }
    #hub-subtitle { font-variant-numeric: tabular-nums; }
    .btn-hub-settings { display: none; }
    body.hub-unlocked .btn-hub-settings { display: flex; }
    #settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
    #settings-overlay.visible { display: flex; }
    #settings-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 28px; min-width: 340px; max-width: 460px; width: 90vw; display: flex; flex-direction: column; gap: 18px; }
    #settings-title { font-size: 15px; font-weight: 600; color: var(--text); }
    #settings-words { display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; }
    .settings-chip { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 5px 12px; font-size: 13px; color: var(--text); }
    .settings-chip button { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
    .settings-chip button:hover { color: var(--danger, #f87171); }
    #settings-box { max-height: 82vh; overflow-y: auto; }
    .settings-section-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
    .settings-row { display: flex; align-items: center; gap: 10px; }
    .settings-text-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: 'Geist', sans-serif; outline: none; transition: border-color 0.15s; }
    .settings-text-input:focus { border-color: var(--accent); }
    .settings-text-short { flex: 0 0 52px; text-align: center; }
    .settings-color { width: 34px; height: 34px; border-radius: 6px; border: 1px solid var(--border2); cursor: pointer; padding: 3px; background: var(--surface2); flex-shrink: 0; }
    .settings-hint { font-size: 12px; color: var(--text3); }
    #settings-add-row { display: flex; gap: 8px; }
    #settings-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 12px; font-size: 14px; color: var(--text); font-family: 'Geist', sans-serif; outline: none; transition: border-color 0.15s; }
    #settings-input:focus { border-color: var(--accent); }
    #hub > p { font-size: 14px; color: var(--text2); margin-bottom: 36px; line-height: 1.7; }
    .hub-topbar { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 12px; min-height: 32px; }
    .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
    .hub-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; cursor: pointer; transition: all 0.15s; overflow: hidden; }
    .hub-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); }
    .hub-card-add { border-style: dashed; cursor: pointer; display: none; align-items: center; justify-content: center; color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 12px; gap: 8px; min-height: 80px; }
    .hub-card-add:hover { border-color: var(--accent); color: var(--accent); background: transparent; transform: none; }
    body.hub-unlocked .hub-card-add { display: flex; }
    body.viewer .btn-hub-lock { display: none; }
    .hub-card-cover { display: none; width: calc(100% + 44px); margin: -20px -22px 14px; height: 140px; }
    .hub-card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hub-card-cover.loaded { display: block; }
    .hub-card-icon { font-size: 20px; margin-bottom: 10px; color: var(--accent); }
    .hub-card-cover.loaded ~ .hub-card-icon { display: none; }
    .hub-card-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .hub-card-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }

    /* ── BACK BUTTON ── */
    .btn-back { display: none; align-items: center; gap: 5px; background: transparent; border: 1px solid var(--border2); border-radius: 6px; padding: 5px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); cursor: pointer; transition: all 0.15s; }
    .btn-back:hover { color: var(--text); border-color: var(--text3); }

    /* ── MODAL ── */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
    #modal-overlay.visible { display: flex; }
    #modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 28px 28px 22px; min-width: 320px; max-width: 420px; width: 90vw; display: flex; flex-direction: column; gap: 14px; }
    #modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
    #modal-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 12px; font-size: 14px; color: var(--text); font-family: 'Geist', sans-serif; outline: none; width: 100%; transition: border-color 0.15s; }
    #modal-input:focus { border-color: var(--accent); }
    #modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-modal-ok { background: var(--accent); color: #000; border: none; border-radius: 7px; padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Geist', sans-serif; }
    .btn-modal-ok:hover { background: var(--accent-mid); }
    .btn-modal-cancel { background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: 7px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: 'Geist', sans-serif; }
    .btn-modal-cancel:hover { background: var(--border); color: var(--text); }
    .btn-modal-danger { background: var(--danger); color: #fff; border: none; border-radius: 7px; padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Geist', sans-serif; }
    .btn-modal-danger:hover { opacity: 0.85; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      #app { position: relative; }
      #sidebar { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; min-width: unset; }
      #content-area { padding: 24px 18px 60px; }
      #hub { padding: 32px 18px 60px; }
      #topbar { padding: 0 14px; gap: 6px; }
      .breadcrumb { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 55vw; }
      .btn-lock { padding: 6px 10px; font-size: 10px; }
      .hub-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="first-run">
    <div class="logo-icon">G</div>
    <h1>Wiki</h1>
    <p>A carregar…</p>
  </div>

  <!-- HUB -->
  <div id="hub">

    <div class="hub-topbar">

      <div id="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

    <nav id="nav"></nav>

  </aside>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="breadcrumb">
        <span class="bc-link" onclick="hubMode ? backToHub() : buildWelcome()">wiki</span>
        <span class="sep">/</span>
        <span id="breadcrumb-cat" class="bc-link" onclick="scrollToCurrentCat()">—</span>
        <span class="sep">/</span>
        <span id="breadcrumb-title" class="current">início</span>

      <div class="topbar-right">
        <button class="btn-sidebar-toggle" id="btn-sidebar-toggle" onclick="toggleSidebar()" title="toggle sidebar">☰</button>
        <span class="save-status" id="save-status"></span>

        <button class="btn-delete" id="btn-delete" onclick="deleteCurrentTopic()">✕ apagar tópico</button>
        <button class="btn-lock locked" id="btn-lock" onclick="toggleLock()">⊘ unlock</button>

    <div id="content-area"></div>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings-overlay">
  <div id="settings-box">
    <div class="settings-section-label">Hub Title</div>
    <div class="settings-row">
      <input id="s-hub-name" type="text" class="settings-text-input" placeholder="GWiki" autocomplete="off" spellcheck="false">
      <input id="s-title-color" type="color" class="settings-color" title="Title color">
    </div>

    <div class="settings-section-label">Subtitle Color</div>
    <div class="settings-row">
      <input id="s-subtitle-color" type="color" class="settings-color" title="Subtitle color">
      <span class="settings-hint">color of the rotating words</span>
    </div>

    <div class="settings-section-label">Logo</div>
    <div class="settings-row">
      <div id="s-logo-preview" class="logo-icon"></div>
      <input id="s-logo-char" type="text" class="settings-text-input settings-text-short" maxlength="2" placeholder="G" autocomplete="off">
      <button id="s-logo-upload-btn" class="btn-modal-cancel">Upload image</button>
      <button id="s-logo-remove-btn" class="btn-modal-cancel" style="display:none">Use letter</button>

    <div id="settings-words"></div>
    <div id="settings-add-row">
      <input id="settings-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="new word">
      <button id="settings-add-btn" class="btn-modal-ok">Add</button>

    <div style="display:flex;justify-content:flex-end;margin-top:4px">

<!-- MODAL -->

  <div id="modal-box">
    <div id="modal-title"></div>
    <input id="modal-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
    <div id="modal-actions">
      <button class="btn-modal-cancel" id="modal-cancel">Cancelar</button>
      <button class="btn-modal-ok" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<script>
// ── APPLY STORED SETTINGS ────────────────────────────
function applyStoredSettings() {
  // inject overrides via a single style element so effects can temporarily override inline, then revert cleanly
  let s = document.getElementById('hub-custom-style');
  if (!s) { s = document.createElement('style'); s.id = 'hub-custom-style'; document.head.appendChild(s); }
  const tc = localStorage.getItem('hub_title_color');
  const sc = localStorage.getItem('hub_subtitle_color');
  s.textContent = [
    tc ? `#hub-name-text { color: ${tc} !important; }` : '',
    sc ? `#hub h1 #hub-subtitle { color: ${sc} !important; }` : '',
  ].join('\n');

  // logo
  const icon = document.querySelector('.logo .logo-icon');
  if (!icon) return;
  if (localStorage.getItem('logo_img')) {
    icon.textContent = '';
    icon.style.backgroundImage = `url(/logo.webp?t=${Date.now()})`;
    icon.style.backgroundSize = 'cover';
    icon.style.backgroundPosition = 'center';
    icon.style.backgroundColor = 'transparent';
  } else {
    icon.textContent = localStorage.getItem('logo_char') || 'G';
    icon.style.backgroundImage = '';
    icon.style.backgroundColor = '';
  }
}

function collectSettings() {
  return {
    hub_name:           localStorage.getItem('hub_name'),
    hub_title_color:    localStorage.getItem('hub_title_color'),
    hub_subtitle_color: localStorage.getItem('hub_subtitle_color'),
    logo_char:          localStorage.getItem('logo_char'),
    logo_img:           localStorage.getItem('logo_img'),
    hub_subtitle_words: localStorage.getItem('hub_subtitle_words'),
  };
}

async function saveSettings() {
  try {
    await fetch('/api/settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(collectSettings()),
    });
  } catch (_) {}
}

async function loadServerSettings() {
  try {
    const s = await fetch('/api/settings', { cache: 'no-store' });
    if (!s.ok) return;
    const d = await s.json();
    const keys = ['hub_name','hub_title_color','hub_subtitle_color','logo_char','logo_img','hub_subtitle_words'];
    keys.forEach(k => {
      if (d[k] != null) localStorage.setItem(k, d[k]);
      else localStorage.removeItem(k);
    });
  } catch (_) {}
}

// ── STATE ─────────────────────────────────────────────
let categories = [];
let currentTopic = null;
let locked = true;
let activeWiki = null;
let hubMode = false;
const DEFAULT_SUBTITLE_WORDS = ['Hub','Nest','Lab','Vault','Base','Core','Hive','Mind','Node','Map','Loop','Dock','Hangar','Groundbase','Sky','Cloud','School'];
let subtitleWords = JSON.parse(localStorage.getItem('hub_subtitle_words') || 'null') || [...DEFAULT_SUBTITLE_WORDS];

// ── MODAL ─────────────────────────────────────────────
function showPrompt(title, placeholder = '', initialValue = '') {
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const titleEl = document.getElementById('modal-title');
    const input = document.getElementById('modal-input');
    const ok = document.getElementById('modal-ok');
    const cancel = document.getElementById('modal-cancel');
    const okBtn = document.getElementById('modal-ok');
    okBtn.className = 'btn-modal-ok';
    input.style.display = '';
    titleEl.textContent = title;
    input.value = initialValue;
    input.placeholder = placeholder;
    overlay.classList.add('visible');
    input.focus();
    const finish = (val) => {
      overlay.classList.remove('visible');
      ok.removeEventListener('click', onOk);
      cancel.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
      resolve(val);
    };
    const onOk = () => finish(input.value.trim() || null);
    const onCancel = () => finish(null);
    const onKey = (e) => { if (e.key === 'Enter') onOk(); else if (e.key === 'Escape') onCancel(); };
    ok.addEventListener('click', onOk);
    cancel.addEventListener('click', onCancel);
    input.addEventListener('keydown', onKey);
  });
}

function showConfirm(title) {
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const titleEl = document.getElementById('modal-title');
    const input = document.getElementById('modal-input');
    const ok = document.getElementById('modal-ok');
    const cancel = document.getElementById('modal-cancel');
    input.style.display = 'none';
    ok.className = 'btn-modal-danger';
    titleEl.textContent = title;
    overlay.classList.add('visible');
    const finish = (val) => {
      overlay.classList.remove('visible');
      ok.removeEventListener('click', onOk);
      cancel.removeEventListener('click', onCancel);
      resolve(val);
    };
    const onOk = () => finish(true);
    const onCancel = () => finish(false);
    ok.addEventListener('click', onOk);
    cancel.addEventListener('click', onCancel);
  });
}

function showTypePicker() {
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const titleEl = document.getElementById('modal-title');
    const input = document.getElementById('modal-input');
    const ok = document.getElementById('modal-ok');
    const cancel = document.getElementById('modal-cancel');
    input.style.display = 'none';
    titleEl.textContent = 'Formato do tópico:';
    ok.className = 'btn-modal-ok';
    ok.textContent = 'HTML';
    cancel.className = 'btn-modal-cancel';
    cancel.textContent = 'Markdown';
    overlay.classList.add('visible');
    const finish = (val) => {
      overlay.classList.remove('visible');
      ok.removeEventListener('click', onOk);
      cancel.removeEventListener('click', onCancel);
      ok.textContent = 'OK';
      cancel.textContent = 'Cancelar';
      resolve(val);
    };
    const onOk = () => finish('html');
    const onCancel = () => finish('md');
    ok.addEventListener('click', onOk);
    cancel.addEventListener('click', onCancel);
  });
}

// ── HELPERS ───────────────────────────────────────────
function slugToDisplay(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function extractTitle(text, slug, type) {
  if (type === 'html') {
    const m = text.match(/<h1[^>]*>([^<]+)<\/h1>/i);
    return m ? m[1].trim() : slugToDisplay(slug);
  }
  const m = text.match(/^#\s+(.+)$/m);
  return m ? m[1].trim() : slugToDisplay(slug);
}

function sanitizeHtml(html, basePath) {
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('style').forEach(el => el.remove());
  div.querySelectorAll('[style]').forEach(el => {
    const cleaned = el.getAttribute('style')
      .replace(/\bcolor\s*:[^;]+;?/gi, '')
      .replace(/\bbackground(-color)?\s*:[^;]+;?/gi, '');
    cleaned.trim() ? el.setAttribute('style', cleaned) : el.removeAttribute('style');
  });
  div.querySelectorAll('[color],[bgcolor]').forEach(el => {
    el.removeAttribute('color');
    el.removeAttribute('bgcolor');
  });
  if (basePath) {
    div.querySelectorAll('img[src]').forEach(img => {
      const src = img.getAttribute('src');
      if (!src.startsWith('http') && !src.startsWith('/') && !src.startsWith('data:')) {
        img.setAttribute('src', basePath + src);
      }
    });
  }
  return div.innerHTML;
}

function toSlug(name) {
  return name.trim().toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9\-_]/g, '');
}

// ── HASH / DEEP-LINK ──────────────────────────────────
function readHash() {
  const raw = location.hash.slice(1);
  if (!raw) return {};
  try {
    const p = new URLSearchParams(raw);
    return { wiki: p.get('wiki'), cat: p.get('cat'), slug: p.get('slug') };
  } catch { return {}; }
}

function updateHash({ wiki, cat, slug } = {}) {
  const parts = [];
  if (wiki) parts.push('wiki=' + encodeURIComponent(wiki));
  if (cat)  parts.push('cat='  + encodeURIComponent(cat));
  if (slug) parts.push('slug=' + encodeURIComponent(slug));
  history.replaceState(null, '', parts.length ? '#' + parts.join('&') : location.pathname + location.search);
}

// ── API ───────────────────────────────────────────────
function wikiParam() {
  return activeWiki ? `&wiki=${encodeURIComponent(activeWiki)}` : '';
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, { cache: 'no-store', ...opts });
  if (!res.ok) {
    const d = await res.json().catch(() => ({}));
    throw new Error(d.error || res.statusText);
  }
  return res.json();
}

let _dragState = null;

async function saveOrder(type, slugs, catSlug) {
  const params = new URLSearchParams({ type });
  if (type === 'topics' && catSlug) params.set('cat', catSlug);
  if (activeWiki) params.set('wiki', activeWiki);
  await apiFetch(`/api/order?${params}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(slugs),
  });
}

async function uploadImage(file, catSlug) {
  const filename = file.name || `paste-${Date.now()}.png`;
  const safe = filename.replace(/[^a-zA-Z0-9._-]/g, '_');
  const wikiQ = activeWiki ? `&wiki=${encodeURIComponent(activeWiki)}` : '';
  const res = await fetch(
    `/api/image?cat=${encodeURIComponent(catSlug)}&filename=${encodeURIComponent(safe)}${wikiQ}`,
    { method: 'POST', headers: { 'Content-Type': file.type || 'application/octet-stream' }, body: file }
  );
  if (!res.ok) throw new Error('upload failed');
  return (await res.json()).url;
}

async function uploadCover(file) {
  const wikiQ = activeWiki ? `&wiki=${encodeURIComponent(activeWiki)}` : '';
  const res = await fetch(
    `/api/image?filename=cover.webp${wikiQ}`,
    { method: 'POST', headers: { 'Content-Type': file.type || 'application/octet-stream' }, body: file }
  );
  if (!res.ok) throw new Error('upload failed');
  return (await res.json()).url;
}

// ── AUTH ──────────────────────────────────────────────
document.body.classList.add('viewer');
if (new URLSearchParams(window.location.search).has('admin')) checkAdminAuth();

function showAuthModal(isSetup, errorTitle) {
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const input = document.getElementById('modal-input');
    const okBtn = document.getElementById('modal-ok');
    const cancelBtn = document.getElementById('modal-cancel');
    okBtn.className = 'btn-modal-ok';
    input.type = 'password';
    input.style.display = '';
    document.getElementById('modal-title').textContent =
      errorTitle || (isSetup ? 'Create admin password:' : 'Admin password:');
    input.placeholder = isSetup ? 'new password' : 'password';
    input.value = '';
    overlay.classList.add('visible');
    input.focus();
    const finish = val => {
      overlay.classList.remove('visible');
      input.type = 'text';
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
      resolve(val);
    };
    const onOk = () => finish(input.value || null);
    const onCancel = () => finish(null);
    const onKey = e => { if (e.key === 'Enter') onOk(); else if (e.key === 'Escape') onCancel(); };
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
    input.addEventListener('keydown', onKey);
  });
}

async function checkAdminAuth() {
  const stored = localStorage.getItem('admin_token');
  if (stored) {
    const res = await fetch(`/api/auth?token=${encodeURIComponent(stored)}`).catch(() => null);
    if (res?.ok && (await res.json()).ok) { grantAdmin(); return; }
    localStorage.removeItem('admin_token');
  }
  const statusRes = await fetch('/api/auth').catch(() => null);
  if (!statusRes?.ok) return;
  const { setup } = await statusRes.json();
  let errorTitle = null;
  while (true) {
    const password = await showAuthModal(setup, errorTitle);
    if (password === null) return;
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const d = await res.json();
    if (d.ok) { localStorage.setItem('admin_token', d.token); grantAdmin(); return; }
    errorTitle = 'Wrong password — try again:';
  }
}

function grantAdmin() {
  document.body.classList.remove('viewer');
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  await loadServerSettings();
  subtitleWords = JSON.parse(localStorage.getItem('hub_subtitle_words') || 'null') || [...DEFAULT_SUBTITLE_WORDS];
  applyStoredSettings();
  try {
    const data = await apiFetch('/api/topics');
    document.getElementById('first-run').style.display = 'none';
    if (data.mode === 'hub') {
      hubMode = true;
      showHub(data.wikis);
    } else {
      hubMode = false;
      categories = data.categories;
      document.getElementById('btn-back').style.display = 'none';
      showMainView();
    }
    await tryHashNav();
  } catch (e) {
    document.getElementById('first-run').innerHTML =
      `<div class="logo-icon">!</div><h1>Erro</h1><p>Não foi possível ligar ao servidor.<br><code style="font-size:12px">${e.message}</code></p>`;
  }
}

async function enterWiki(wikiName, wikiDisplay) {
  try {
    const data = await apiFetch('/api/topics?wiki=' + encodeURIComponent(wikiName));
    activeWiki = wikiName;
    categories = data.categories;
    document.getElementById('wiki-name').textContent = wikiDisplay;
    document.getElementById('wiki-label').textContent = 'wiki';
    document.getElementById('hub').classList.remove('visible');
    clearInterval(window._hubSubtitleTimer);
    document.getElementById('btn-back').style.display = 'flex';
    const wasHubUnlocked = !hubLocked;
    hubLocked = true;
    document.body.classList.remove('hub-unlocked');
    document.getElementById('btn-hub-lock').classList.add('locked');
    document.getElementById('btn-hub-lock').textContent = '⊘ unlock';
    if (wasHubUnlocked) {
      locked = false;
      document.body.classList.add('unlocked');
      const btnLock = document.getElementById('btn-lock');
      btnLock.classList.remove('locked');
      btnLock.textContent = '⊙ lock';
    }
    updateHash({ wiki: wikiName });
    showMainView();
  } catch (e) {
    alert('Erro ao abrir wiki: ' + e.message);
  }
}

async function backToHub() {
  locked = true;
  currentTopic = null;
  activeWiki = null;
  document.body.classList.remove('unlocked');
  const btnLock = document.getElementById('btn-lock');
  btnLock.classList.add('locked');
  btnLock.textContent = '⊘ unlock';

  document.getElementById('sidebar').classList.remove('visible');
  document.getElementById('main').classList.remove('visible');

  updateHash();
  const data = await apiFetch('/api/topics');
  showHub(data.wikis);
}

async function tryHashNav() {
  const { wiki, cat, slug } = readHash();
  if (!wiki && !cat) return;
  try {
    if (hubMode && wiki && !activeWiki) {
      const wikiData = await apiFetch('/api/topics?wiki=' + encodeURIComponent(wiki));
      activeWiki = wiki;
      categories = wikiData.categories;
      document.getElementById('wiki-name').textContent = slugToDisplay(wiki);
      document.getElementById('wiki-label').textContent = 'wiki';
      document.getElementById('hub').classList.remove('visible');
      document.getElementById('btn-back').style.display = 'flex';
      hubLocked = true;
      document.body.classList.remove('hub-unlocked');
      document.getElementById('btn-hub-lock').classList.add('locked');
      document.getElementById('btn-hub-lock').textContent = '⊘ unlock';
      showMainView();
    }
    if (!cat) return; // wiki-only hash: welcome view of that wiki is enough
    const catObj = categories.find(c => c.slug === cat);
    if (!catObj) return;
    if (slug) {
      const topicObj = catObj.topics.find(t => t.slug === slug);
      if (topicObj) await loadTopic({ catSlug: cat, slug, title: topicObj.title });
    } else {
      updateHash({ wiki: activeWiki, cat });
      const section = document.querySelector(`.nav-category[data-cat-slug="${CSS.escape(cat)}"]`);
      if (section) {
        section.classList.remove('collapsed');
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
  } catch { /* fail silently — show normal view */ }
}

function showHub(wikis) {
  document.getElementById('sidebar').classList.remove('visible');
  document.getElementById('main').classList.remove('visible');
  document.getElementById('btn-back').style.display = 'none';

  const grid = document.getElementById('hub-grid');
  grid.innerHTML = '';
  wikis.forEach(w => {
    const card = document.createElement('div');
    card.className = 'hub-card';
    card.innerHTML = `
      <div class="hub-card-cover"><img alt=""></div>
      <div class="hub-card-icon">◈</div>
      <div class="hub-card-name">${w.display}</div>
      <div class="hub-card-meta">${w.catCount} categoria${w.catCount !== 1 ? 's' : ''}</div>`;
    const coverDiv = card.querySelector('.hub-card-cover');
    const coverImg = coverDiv.querySelector('img');
    coverImg.addEventListener('load', () => coverDiv.classList.add('loaded'));
    coverImg.src = `/${encodeURIComponent(w.name)}/cover.webp?t=${Date.now()}`;
    card.addEventListener('click', () => enterWiki(w.name, w.display));
    grid.appendChild(card);
  });
  const addCard = document.createElement('div');
  addCard.className = 'hub-card hub-card-add';
  addCard.textContent = '＋ new wiki';
  addCard.addEventListener('click', addWiki);
  grid.appendChild(addCard);

  document.getElementById('hub').classList.add('visible');

  const subtitleEl = document.getElementById('hub-subtitle');
  // subtitleWords is module-level, loaded from localStorage
  const subtitleFx = {
    scramble: (el, t) => {
      const ch = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#&'; let i = 0;
      el._sc = setInterval(() => {
        const r = Math.floor((i/12)*t.length);
        el.textContent = t.slice(0,r) + Array.from({length:t.length-r},()=>ch[Math.floor(Math.random()*ch.length)]).join('');
        if(++i>12){el.textContent=t;clearInterval(el._sc);}
      }, 40);
    },
    fade: (el, t) => {
      el.style.transition='opacity 0.3s'; el.style.opacity='0';
      el._tout=setTimeout(()=>{el.textContent=t;el.style.opacity='1';},320);
    },
    typewriter: (el, t) => {
      let i=0; el.textContent='|';
      el._sc=setInterval(()=>{
        el.textContent=t.slice(0,++i)+(i<t.length?'|':'');
        if(i>=t.length)clearInterval(el._sc);
      },70);
    },
    glitch: (el, t) => {
      const cols=['#ff0066','#00ffcc','#ffff00']; let i=0;
      el._sc=setInterval(()=>{
        if(i<10){
          el.style.transform=`translate(${(Math.random()-.5)*10}px,${(Math.random()-.5)*4}px)`;
          el.style.color=cols[Math.floor(Math.random()*cols.length)];
          if(i===5)el.textContent=t;
        }else{el.style.transform='';el.style.color='';clearInterval(el._sc);}
        i++;
      },40);
    },
    slide: (el, t) => {
      el.style.transition='opacity 0.18s,transform 0.18s';
      el.style.opacity='0'; el.style.transform='translateY(-14px)';
      el._tout=setTimeout(()=>{
        el.textContent=t; el.style.transform='translateY(10px)';
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          el.style.transition='opacity 0.2s,transform 0.2s';
          el.style.opacity='1'; el.style.transform='';
        }));
      },200);
    },
    blur: (el, t) => {
      el.style.transition='opacity 0.25s,filter 0.25s';
      el.style.opacity='0'; el.style.filter='blur(10px)';
      el._tout=setTimeout(()=>{
        el.textContent=t; el.style.filter='blur(10px)'; el.style.opacity='0';
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          el.style.transition='opacity 0.3s,filter 0.3s';
          el.style.opacity='1'; el.style.filter='';
        }));
      },280);
    },
    flicker: (el, t) => {
      el.textContent=t;
      const p=[0,1,0,0,1,0,1,0,1,1,0,1,1,1,1]; let i=0;
      el._sc=setInterval(()=>{
        el.style.opacity=p[i]?'1':'0.05';
        if(++i>=p.length){el.style.opacity='1';clearInterval(el._sc);}
      },55);
    },
    wave: (el, t) => {
      el.innerHTML=t.split('').map((c,i)=>
        `<span style="display:inline-block;opacity:0;transform:translateY(18px);transition:opacity 0.18s ${i*45}ms,transform 0.18s ${i*45}ms">${c}</span>`
      ).join('');
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.querySelectorAll('span').forEach(s=>{s.style.opacity='1';s.style.transform='';});
      }));
      el._tout=setTimeout(()=>{el.textContent=t;},t.length*45+350);
    },
    rainbow: (el, t) => {
      const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f1c','#00f5d4'];
      el.innerHTML=t.split('').map((c,i)=>
        `<span style="color:${cols[i%cols.length]};transition:color 0.5s">${c}</span>`
      ).join('');
      el._tout=setTimeout(()=>{
        el.querySelectorAll('span').forEach(s=>s.style.color='var(--accent)');
        setTimeout(()=>{el.textContent=t;},600);
      },400);
    },
  };
  const fxNames = Object.keys(subtitleFx);
  const resetSubtitle = el => {
    clearInterval(el._sc); clearTimeout(el._tout);
    el.style.transition=el.style.opacity=el.style.transform=el.style.filter=el.style.color='';
  };

  let subtitleIdx = 0;
  clearInterval(window._hubSubtitleTimer);
  window._hubSubtitleTimer = setInterval(() => {
    subtitleIdx = (subtitleIdx + 1) % subtitleWords.length;
    resetSubtitle(subtitleEl);
    subtitleFx[fxNames[Math.floor(Math.random()*fxNames.length)]](subtitleEl, subtitleWords[subtitleIdx]);
  }, 2200);

  const nameEl = document.getElementById('hub-name-text');
  const saved = localStorage.getItem('hub_name');
  if (saved) nameEl.textContent = saved;
  nameEl.onclick = async () => {
    if (!document.body.classList.contains('hub-unlocked')) return;
    const val = await showPrompt('Hub name:', 'ex: My Wiki', nameEl.textContent);
    if (!val) return;
    nameEl.textContent = val;
    localStorage.setItem('hub_name', val);
    saveSettings();
  };
}

function showMainView() {

function buildSidebar() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';

  categories.forEach((cat, catIdx) => {
    const section = document.createElement('div');
    section.className = 'nav-category';
    section.dataset.catSlug = cat.slug;

    if (document.body.classList.contains('unlocked')) {
      section.draggable = true;
      section.addEventListener('dragstart', e => {
        if (!e.target.closest('.nav-category-header') && e.target !== section) return;
        e.stopPropagation();
        e.dataTransfer.effectAllowed = 'move';
        _dragState = { kind: 'category', catIdx, catSlug: cat.slug };
        section.classList.add('dragging');
      });
      section.addEventListener('dragend', () => {
        section.classList.remove('dragging');
        _dragState = null;
        const existing = nav.querySelector('.drag-indicator');
        if (existing) existing.remove();
      });

      section.addEventListener('dragover', e => {
        if (!_dragState || _dragState.kind !== 'category') return;
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'move';
        const existing = nav.querySelector('.drag-indicator');
        if (existing) existing.remove();
        const rect = section.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        const indicator = document.createElement('div');
        indicator.className = 'drag-indicator';
        if (e.clientY < mid) {
          nav.insertBefore(indicator, section);
        } else {
          section.after(indicator);
        }
      });

      section.addEventListener('dragleave', e => {
        if (!section.contains(e.relatedTarget)) {
          const existing = nav.querySelector('.drag-indicator');
          if (existing) existing.remove();
        }
      });

      section.addEventListener('drop', e => {
        e.preventDefault();
        e.stopPropagation();
        const existing = nav.querySelector('.drag-indicator');
        if (existing) existing.remove();
        const data = _dragState;
        if (!data || data.kind !== 'category') return;

        const fromIdx = categories.findIndex(c => c.slug === data.catSlug);
        if (fromIdx === -1) return;
        const rect = section.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        let toIdx = e.clientY < mid ? catIdx : catIdx + 1;
        if (fromIdx === toIdx || fromIdx === toIdx - 1) return;

        const snapshot = [...categories];
        const [moved] = categories.splice(fromIdx, 1);
        const insertAt = toIdx > fromIdx ? toIdx - 1 : toIdx;
        categories.splice(insertAt, 0, moved);
        buildSidebar();
        updateNavActive();

        saveOrder('categories', categories.map(c => c.slug)).catch(err => {
          categories.splice(0, categories.length, ...snapshot);
          buildSidebar();
          updateNavActive();
          alert('Erro ao guardar ordem: ' + err.message);
        });
      });
    }

    const hdr = document.createElement('div');
    hdr.className = 'nav-category-header';
    hdr.innerHTML = `<span class="cat-icon">◈</span>${cat.display}<span class="chevron">▾</span>`;
    hdr.addEventListener('click', () => section.classList.toggle('collapsed'));
    section.appendChild(hdr);

    const items = document.createElement('div');
    items.className = 'nav-items';

    cat.topics.forEach((topic, topicIdx) => {
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.catSlug = cat.slug;
      item.dataset.topicSlug = topic.slug;
      const dot = document.createElement('span');
      dot.className = 'nav-dot';
      item.appendChild(dot);
      item.appendChild(document.createTextNode(topic.title));
      item.addEventListener('click', () => loadTopic({ catSlug: cat.slug, slug: topic.slug, title: topic.title, type: topic.type }));

      if (document.body.classList.contains('unlocked')) {
        item.draggable = true;
        item.addEventListener('dragstart', e => {
          e.dataTransfer.effectAllowed = 'move';
          _dragState = { kind: 'topic', catSlug: cat.slug, topicIdx, topicSlug: topic.slug };
          item.classList.add('dragging');
        });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          _dragState = null;
          const existing = items.querySelector('.drag-indicator');
          if (existing) existing.remove();
        });

        item.addEventListener('dragover', e => {
          if (!_dragState || _dragState.kind !== 'topic' || _dragState.catSlug !== cat.slug) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          const existing = items.querySelector('.drag-indicator');
          if (existing) existing.remove();
          const rect = item.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          const indicator = document.createElement('div');
          indicator.className = 'drag-indicator';
          if (e.clientY < mid) {
            items.insertBefore(indicator, item);
          } else {
            item.after(indicator);
          }
        });

        item.addEventListener('dragleave', e => {
          if (!items.contains(e.relatedTarget)) {
            const existing = items.querySelector('.drag-indicator');
            if (existing) existing.remove();
          }
        });

        item.addEventListener('drop', e => {
          e.preventDefault();
          const existing = items.querySelector('.drag-indicator');
          if (existing) existing.remove();
          const data = _dragState;
          if (!data || data.kind !== 'topic' || data.catSlug !== cat.slug) return;

          const fromIdx = catObj.topics.findIndex(t => t.slug === data.topicSlug);
          if (fromIdx === -1) return;
          const rect = item.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          let toIdx = e.clientY < mid ? topicIdx : topicIdx + 1;
          if (fromIdx === toIdx || fromIdx === toIdx - 1) return;

          const catObj = categories.find(c => c.slug === cat.slug);
          if (!catObj) return;
          const snapshot = [...catObj.topics];
          const [moved] = catObj.topics.splice(fromIdx, 1);
          const insertAt = toIdx > fromIdx ? toIdx - 1 : toIdx;
          catObj.topics.splice(insertAt, 0, moved);
          buildSidebar();
          updateNavActive();

          saveOrder('topics', catObj.topics.map(t => t.slug), cat.slug).catch(err => {
            catObj.topics = snapshot;
            buildSidebar();
            updateNavActive();
            alert('Erro ao guardar ordem: ' + err.message);
          });
        });
      }

      items.appendChild(item);
    });

    items.addEventListener('dragleave', e => {
      if (!items.contains(e.relatedTarget)) {
        const existing = items.querySelector('.drag-indicator');
        if (existing) existing.remove();
      }
    });

    const addBtn = document.createElement('div');
    addBtn.className = 'nav-add-topic';
    addBtn.textContent = '+ novo tópico';
    addBtn.addEventListener('click', e => { e.stopPropagation(); addTopic(catIdx); });
    items.appendChild(addBtn);

    section.appendChild(items);
    nav.appendChild(section);
  });

  const addCatBtn = document.createElement('div');
  addCatBtn.className = 'nav-add-category';
  addCatBtn.textContent = '+ nova categoria';
  addCatBtn.addEventListener('click', addCategory);
  nav.appendChild(addCatBtn);
}

function setupHeroCover() {
  const cover = document.getElementById('hero-cover');
  const img = document.getElementById('hero-cover-img');
  const base = activeWiki ? `/${encodeURIComponent(activeWiki)}/` : '/';

  img.addEventListener('load', () => cover.classList.remove('empty'));
  img.addEventListener('error', () => cover.classList.add('empty'));
  img.src = `${base}cover.webp?t=${Date.now()}`;

  let input = document.getElementById('hero-cover-input');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.id = 'hero-cover-input';
    input.style.display = 'none';
    document.body.appendChild(input);
  }
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    input.value = '';
    try {
      await uploadCover(file);
      img.src = `${base}cover.webp?t=${Date.now()}`;
    } catch (e) { alert('Erro ao carregar imagem: ' + e.message); }
  };
  cover.onclick = () => {
    if (document.body.classList.contains('unlocked')) input.click();
  };

  const handle = document.getElementById('hero-cover-handle');
  const sizeKey = `cover_size_${activeWiki || '__root__'}`;
  const saved = parseInt(localStorage.getItem(sizeKey));
  if (saved >= 40 && saved <= 300) cover.style.width = cover.style.height = saved + 'px';

  handle.addEventListener('click', e => e.stopPropagation());
  handle.addEventListener('mousedown', e => {
    if (!document.body.classList.contains('unlocked')) return;
    e.preventDefault();
    e.stopPropagation();
    handle.classList.add('dragging');
    const startX = e.clientX;
    const startSize = cover.getBoundingClientRect().width;
    const onMove = e => {
      const size = Math.max(40, Math.min(300, startSize + (e.clientX - startX)));
      cover.style.width = cover.style.height = size + 'px';
    };
    const onUp = () => {
      handle.classList.remove('dragging');
      const size = parseInt(cover.style.width);
      if (size) localStorage.setItem(sizeKey, size);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

async function setupHeroDescription() {

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function addCopyButtons(container) {
  container.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'copiar';
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const codeEl = pre.querySelector('code');
      const text = codeEl ? codeEl.innerText : pre.innerText;
      const confirm = () => {
        btn.textContent = '✓ copiado';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copiar'; btn.classList.remove('copied'); }, 2000);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(confirm).catch(() => {
          fallbackCopy(text);
          confirm();
        });
      } else {
        fallbackCopy(text);
        confirm();
      }
    });
    pre.appendChild(btn);
  });
}

      ? `/${activeWiki}/topics/${topic.catSlug}/`

      `<div class="topic-page"><h1>${topic.title}</h1><p style="color:var(--text3)">Erro ao carregar tópico.</p></div>`;
  }
}

function parseMarkdown(md) {
  const codeBlocks = [];

  let html = md
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // extract fenced code blocks before any other transformation
  html = html.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code>${code.trimEnd()}</code></pre>`);
    return `\x00CODE${idx}\x00`;
  });

  // inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  // bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // images ![alt](url)
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) =>
    `<img src="${url}" alt="${alt}" class="md-img">`);

  // links [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) =>
    `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`);

  // callouts (uses &gt; because HTML was already escaped)
  html = html.replace(/^&gt;! (.+)$/gm, '<div class="callout warn">$1</div>');
  html = html.replace(/^&gt; (.+)$/gm,  '<div class="callout">$1</div>');

  // unordered lists
  html = html.replace(/((?:^- .+\n?)+)/gm, block => {
    const items = block.trim().split('\n')
      .map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });

  // ordered lists
  html = html.replace(/((?:^\d+\. .+\n?)+)/gm, block => {
    const items = block.trim().split('\n')
      .map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  // paragraphs
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<(h[1-3]|ul|ol|pre|div|img)/.test(block)) return block;
    if (/^\x00CODE\d+\x00$/.test(block)) return block;
    return `<p>${block.replace(/\n/g, ' ')}</p>`;
  }).join('\n');

  // restore code blocks
  html = html.replace(/\x00CODE(\d+)\x00/g, (_, i) => codeBlocks[+i]);

  return html;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('visible');
}

function toggleLock() {
  locked = !locked;
  const btn = document.getElementById('btn-lock');
  document.body.classList.toggle('unlocked', !locked);
  btn.classList.toggle('locked', locked);
  btn.textContent = locked ? '⊘ unlock' : '⊙ lock';
  buildSidebar();
  updateNavActive();
  if (currentTopic) loadTopic(currentTopic);
}

let hubLocked = true;
function toggleHubLock() {
  hubLocked = !hubLocked;
  const btn = document.getElementById('btn-hub-lock');
  document.body.classList.toggle('hub-unlocked', !hubLocked);
  btn.classList.toggle('locked', hubLocked);
  btn.textContent = hubLocked ? '⊘ unlock' : '⊙ lock';
}

function refreshLogoPreview() {
  const preview = document.getElementById('s-logo-preview');
  const removeBtn = document.getElementById('s-logo-remove-btn');
  if (!preview) return;
  if (localStorage.getItem('logo_img')) {
    preview.textContent = '';
    preview.style.backgroundImage = `url(/logo.webp?t=${Date.now()})`;
    preview.style.backgroundSize = 'cover';
    preview.style.backgroundPosition = 'center';
    preview.style.backgroundColor = 'transparent';
    if (removeBtn) removeBtn.style.display = '';
  } else {
    preview.textContent = localStorage.getItem('logo_char') || 'G';
    preview.style.backgroundImage = '';
    preview.style.backgroundColor = '';
    if (removeBtn) removeBtn.style.display = 'none';
  }
}

function openHubSettings() {
  const overlay = document.getElementById('settings-overlay');

  // populate fields
  document.getElementById('s-hub-name').value = localStorage.getItem('hub_name') || '';
  document.getElementById('s-title-color').value = localStorage.getItem('hub_title_color') || '#ffffff';
  document.getElementById('s-subtitle-color').value = localStorage.getItem('hub_subtitle_color') || '#4ade80';
  document.getElementById('s-logo-char').value = localStorage.getItem('logo_char') || 'G';
  refreshLogoPreview();
  renderSettingsChips();

  // hub name
  document.getElementById('s-hub-name').oninput = e => {
    const val = e.target.value.trim();
    document.getElementById('hub-name-text').textContent = val || 'GWiki';
    val ? localStorage.setItem('hub_name', val) : localStorage.removeItem('hub_name');
    saveSettings();
  };

  // colors — live update via injected style
  document.getElementById('s-title-color').oninput = e => {
    localStorage.setItem('hub_title_color', e.target.value);
    applyStoredSettings();
    saveSettings();
  };
  document.getElementById('s-subtitle-color').oninput = e => {
    localStorage.setItem('hub_subtitle_color', e.target.value);
    applyStoredSettings();
    saveSettings();
  };

  // logo char
  document.getElementById('s-logo-char').oninput = e => {
    const char = e.target.value.trim() || 'G';
    localStorage.setItem('logo_char', char);
    if (!localStorage.getItem('logo_img')) {
      applyStoredSettings();
      refreshLogoPreview();
    }
    saveSettings();
  };

  // logo image upload
  const fileInput = document.getElementById('s-logo-file');
  document.getElementById('s-logo-upload-btn').onclick = () => fileInput.click();
  fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if (!file) return;
    fileInput.value = '';
    try {
      const res = await fetch('/api/image?filename=logo.webp', {
        method: 'POST',
        headers: { 'Content-Type': file.type || 'application/octet-stream' },
        body: file
      });
      if (!res.ok) throw new Error('upload failed');
      localStorage.setItem('logo_img', '1');
      applyStoredSettings();
      refreshLogoPreview();
      saveSettings();
    } catch(e) { alert('Upload failed: ' + e.message); }
  };

  // remove logo image — revert to letter
  document.getElementById('s-logo-remove-btn').onclick = () => {
    localStorage.removeItem('logo_img');
    applyStoredSettings();
    refreshLogoPreview();
    saveSettings();
  };

  const wordInput = document.getElementById('settings-input');
  overlay.classList.add('visible');
  wordInput.focus();
  wordInput.onkeydown = e => { if (e.key === 'Enter') addSubtitleWord(); };
  document.getElementById('settings-add-btn').onclick = addSubtitleWord;
  overlay.onclick = e => { if (e.target === overlay) closeHubSettings(); };
}

function closeHubSettings() {
  document.getElementById('settings-overlay').classList.remove('visible');
}

function renderSettingsChips() {
  const container = document.getElementById('settings-words');
  container.innerHTML = '';
  subtitleWords.forEach((word, i) => {
    const chip = document.createElement('div');
    chip.className = 'settings-chip';
    chip.innerHTML = `<span>${word}</span><button title="remove">×</button>`;
    chip.querySelector('button').onclick = () => {
      subtitleWords.splice(i, 1);
      saveSubtitleWords();
      renderSettingsChips();
    };
    container.appendChild(chip);
  });
}

function addSubtitleWord() {
  const input = document.getElementById('settings-input');
  const word = input.value.trim();
  if (!word || subtitleWords.includes(word)) { input.value = ''; return; }
  subtitleWords.push(word);
  saveSubtitleWords();
  renderSettingsChips();
  input.value = '';
  input.focus();
}

function saveSubtitleWords() {
  localStorage.setItem('hub_subtitle_words', JSON.stringify(subtitleWords));
  saveSettings();
}

async function addWiki() {
  const name = await showPrompt('Nome da nova wiki:', 'ex: minha-wiki');
  if (!name) return;
  try {
    await apiFetch('/api/wiki', {
      method: 'POST',

    });
